appId: com.agent.desktop
productName: Agent Desktop
publish:
  - provider: github
    owner: BaLaurent
    repo: agent-desktop
    releaseType: release
directories:
  buildResources: build
  output: release
asar: false
files:
  - out
  - package.json
  - from: node_modules
    to: node_modules
    filter:
      - discord.js/**
      - "@discordjs/collection/**"
      - "@discordjs/ws/**"
      - "@discordjs/builders/**"
      - "@discordjs/formatters/**"
      - "@discordjs/util/**"
      - "@discordjs/rest/**"
      - "@sapphire/snowflake/**"
      - discord-api-types/**
      - fast-deep-equal/**
      - lodash.snakecase/**
      - magic-bytes.js/**
      - tslib/**
      - undici/**
      - "@mariozechner/**"
extraResources:
  - from: build/trayTemplate.png
    to: trayTemplate.png
  - from: build/trayTemplate@2x.png
    to: trayTemplate@2x.png
  - from: build/trayDark.png
    to: trayDark.png
  - from: build/trayDark@2x.png
    to: trayDark@2x.png
  - from: build/trayLight.png
    to: trayLight.png
  - from: build/trayLight@2x.png
    to: trayLight@2x.png
  - from: resources/mcp/scheduler-server.mjs
    to: mcp/scheduler-server.mjs
  - from: resources/jupyter/bridge.py
    to: jupyter/bridge.py
  - from: node_modules/sql.js/dist/sql-wasm.wasm
    to: sql-wasm.wasm
extraMetadata:
  main: ./out/main/index.js
mac:
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  category: public.app-category.productivity
  icon: build/icon.icns
  extendInfo:
    NSMicrophoneUsageDescription: "Agent Desktop uses the microphone for voice input transcription (via whisper.cpp). Audio is processed locally and never sent to any server."

linux:
  artifactName: "${name}-${version}-${arch}.${ext}"
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  category: Utility
  maintainer: Agent Desktop Contributors
  desktop:
    MimeType: x-scheme-handler/agent
  synopsis: Open-source desktop client for Claude AI
win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64
        - arm64
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
